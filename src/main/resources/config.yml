# PlayerBounties-OG Config File.
# Manually verified translations:
# de_de - German (Germany)
# en_us - English (US)
# en_gb - English (UK)
# fr_fr - French (France)
# nl_nl - Dutch (Netherlands)
#
# Automatically translated (may contain issues):
# es_es - Spanish (Spain)
# hi_in - Hindi (India)
# hu_hu - Hungarian (Hungary)
# it_it - Italian (Italy)
# ru_ru - Russian (Russia)
# se_se - Swedish (Sweden)
# zh_cn - Chinese (China)
# en_uwu - English (Don't ask)
lang: "en_us"

# Add more money on the victim player than the command sender spends.
# For example: /bounty set TechnicallyCoded 100 -> turns into a bounty of 200 while only taking 100 from the sender.
bounty-multiplier: 1.0

# Minimum and maximum bounty amount - These values are checked BEFORE the multiplier above is applied.
bounty-minimum: 1.0
bounty-maximum: 1000000.0

# If we should give the bounty money to the killer.
bounty-claimable: true

# Give more or less money to the killer. This value can be negative if you want to.
bounty-claim-multiplier: 1.0

# If we should announce that the bounty was claimed.
bounty-claimed-announce: true

# Chance (0-100) that claiming a bounty drops the victim's player head.
bounty-head-drop-chance: 50.0

# How placed bounty heads should display extra labels.
# none = disabled
# hover = show a temporary floating label while a player aims at the head
bounty-head-label-mode: hover

# Maximum range in blocks for detecting a looked-at bounty head.
bounty-head-label-range: 8.0

# If we should announce that the bounty was placed.
bounty-placed-announce: true

# Should the bounty money be taken from the player who dies?
# This can reduce same-team killing (or the use of alts) to claim the bounty from themselves.
bounty-take-from-victim: false
